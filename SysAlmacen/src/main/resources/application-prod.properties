spring.application.name=SysAlmacen
spring.datasource.jndi-name=java:comp/env/jdbc/MyMySQLDataSource
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Inicializacion
spring.jpa.defer-datasource-initialization=true
# By default enabled for Embedded Databases opciones: never, always, embedded
spring.sql.init.mode=never

# Internacionalizacion
spring.messages.basename=messages
spring.messages.encoding=UTF-8
# JWT (ISO 27001 A.9.4.3)
jwt.secret = secretsecretsecretsecretsecretsecretsecretsecret
jwt.expiration = 36000
# CORS (OWASP A05)
cors.allowed-origins=http://localhost:8080,https://frontend.miempresa.com

# Cloudinary (ISO 27001 A.9.4.3)
# Las credenciales deben ser variables de entorno en el servidor.
# cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
# cloudinary.api-key=${CLOUDINARY_API_KEY}
# cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Swagger/OpenAPI: DESHABILITADO en produccion (OWASP A05)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
#springdoc.api-docs.path=/api-docs
#springdoc.swagger-ui.path=/doc/swagger-ui.html
##springdoc.swagger-ui.path=/swagger-ui-custom.html

# Limites de tamanho de request (anti-DoS)
# OWASP A06:2021 - Vulnerable and Outdated Components / DoS prevention
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Compresion de respuestas
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html
server.compression.min-response-size=1024

# Sesion (stateless: JWT no usa sesion HTTP)
server.servlet.session.timeout=15m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Actuator: deshabilitado en produccion (OWASP A05)
# Si se necesita monitoreo, exponer solo health con autenticacion separada.
management.endpoints.enabled-by-default=false
# management.endpoint.health.enabled=true
# management.endpoints.web.exposure.include=health

# Logging de seguridad (ISO 27001 A.12.4)
# Los eventos de seguridad del EarlySecurityFilter se loguean en WARN.
logging.level.pe.edu.upeu.sysalmacen.configuracion.security=WARN
logging.level.org.springframework.security=WARN
logging.level.root=INFO
